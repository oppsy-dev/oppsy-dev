name: Release

on:
  release:
    types: [created]

jobs:
  publish:
    name: Publish Docker image
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Dagger CLI
        run: curl -fsSL https://dl.dagger.io/dagger/install.sh | DAGGER_VERSION=0.20.6 BIN_DIR=/usr/local/bin sh

      - name: Publish version tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dagger call oppsy-publish \
            --src=. \
            --address=ghcr.io/${{ github.repository_owner }}/oppsy:${{ github.event.release.tag_name }} \
            --username=${{ github.actor }} \
            --secret=env:GITHUB_TOKEN

      - name: Check if latest release
        id: check_latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST_TAG=$(gh api repos/${{ github.repository }}/releases/latest --jq '.tag_name')
          if [ "${LATEST_TAG}" = "${{ github.event.release.tag_name }}" ]; then
            echo "is_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_latest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish latest tag
        if: steps.check_latest.outputs.is_latest == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dagger call oppsy-publish \
            --src=. \
            --address=ghcr.io/${{ github.repository_owner }}/oppsy:latest \
            --username=${{ github.actor }} \
            --secret=env:GITHUB_TOKEN

  release-cli:
    name: Release CLI (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: "386"
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: "386"

    steps:
      - uses: actions/checkout@v4

      - name: Install Dagger CLI
        run: curl -fsSL https://dl.dagger.io/dagger/install.sh | DAGGER_VERSION=0.20.6 BIN_DIR=/usr/local/bin sh

      - name: Build CLI binary
        run: |
          TAG=${{ github.event.release.tag_name }}
          EXT=$([ "${{ matrix.goos }}" = "windows" ] && echo ".zip" || echo ".tar.gz")
          ARCHIVE="oppsy-cli_${TAG}_${{ matrix.goos }}_${{ matrix.goarch }}${EXT}"
          mkdir -p ./dist
          dagger call cli-build \
            --src=. \
            --version=${TAG} \
            --goos=${{ matrix.goos }} \
            --goarch=${{ matrix.goarch }} \
            export --path=./dist/${ARCHIVE}

      - name: Upload artifact to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: find ./dist -type f | xargs gh release upload ${{ github.event.release.tag_name }} --clobber

  announce:
    name: Discord announcement
    needs: [publish, release-cli]
    if: ${{ always() && needs.publish.result == 'success' }}
    runs-on: ubuntu-22.04

    steps:
      - name: Prepare announcement message
        id: message
        env:
          RELEASE_BODY: ${{ github.event.release.body }}
          RELEASE_NAME: ${{ github.event.release.name }}
        run: |
          echo "content<<EOF" >> "$GITHUB_OUTPUT"
          echo "**${RELEASE_NAME}** is out!" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo "${RELEASE_BODY}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Send Discord announcement
        uses: tsickert/discord-webhook@v7.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_ANNOUNCEMENTS }}
          content: ${{ steps.message.outputs.content }}
