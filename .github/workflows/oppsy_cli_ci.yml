name: oppsy-cli CI

on:
  push:
    branches: ["main"]
    paths:
      - "oppsy-cli/**"
      - ".github/workflows/oppsy_cli_ci.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "oppsy-cli/**"
      - ".github/workflows/oppsy_cli_ci.yml"

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: oppsy-cli

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: oppsy-cli/go.mod
          cache-dependency-path: oppsy-cli/go.sum

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: oppsy-cli
          version: latest
